{{ define "main" }}
  <section class="intro">
    {{ .Content }}
  </section>

  {{ with where .Site.RegularPages "Section" "posts" }}
    <section class="recent-posts">
      <h2>Recent Posts</h2>
      <ul class="post-list">
        {{ range first 5 . }}
          <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            {{ if not .Date.IsZero }}
              <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 2, 2006" }}</time>
            {{ end }}
          </li>
        {{ end }}
      </ul>
    </section>
  {{ end }}
{{ end }}
