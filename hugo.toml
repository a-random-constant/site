baseURL = "https://arandomconstant.online/"
languageCode = "en-us"
title = "A Random Constant"
theme = "color-your-world"

# Number of posts to show on list pages
[pagination]
  pagerSize = 10

[params]
  description = "A random constant - musings of a systems thinker"
  author = "a-random-constant"

  [params.style]
    # Accent colors for dark and light mode respectively (green)
    darkAccent  = "#3fb950"
    lightAccent = "#1a7f37"
    presets     = [ "#1a7f37", "#3fb950", "#1dbc91", "#3e6728", "#7fc121" ]

[markup.highlight]
  noClasses = false

[menu]
  [[menu.main]]
    name = "Home"
    pageRef = "/"
    weight = 1
  [[menu.main]]
    name = "Posts"
    pageRef = "/posts"
    weight = 2
  [[menu.main]]
    name = "About"
    pageRef = "/about"
    weight = 3

[markup.goldmark.renderer]
  unsafe = true
